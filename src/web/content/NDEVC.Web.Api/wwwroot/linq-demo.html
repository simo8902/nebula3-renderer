<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LINQ + EF Core Real Usage</title>
  <style>
    :root {
      --bg: #f2f4f8;
      --surface: #ffffff;
      --line: #d7dde7;
      --text: #1a2433;
      --muted: #5d6e85;
      --accent: #0a6aa1;
      --accent-2: #046f58;
      --danger: #9e2d2d;
      --danger-bg: #fff1f1;
    }
    body {
      margin: 0;
      background: linear-gradient(180deg, #edf2fb 0%, #f9fafc 60%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }
    .wrap {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 16px 28px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 8px 30px rgba(11, 25, 50, 0.04);
    }
    h1, h2 {
      margin: 0;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 6px;
    }
    h2 {
      font-size: 16px;
      margin-bottom: 8px;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    .toolbar {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 120px 120px auto auto;
      gap: 8px;
      align-items: center;
    }
    input, button {
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 9px 10px;
      font-size: 14px;
    }
    button {
      color: #fff;
      border: 0;
      cursor: pointer;
      background: var(--accent);
    }
    button.alt {
      background: var(--accent-2);
    }
    button.warn {
      background: #a14f1a;
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 8px;
    }
    .kv {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fcfdff;
    }
    .kv .k {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }
    .examples {
      display: grid;
      gap: 10px;
    }
    .example {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fbfcff;
    }
    .example .op {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .example .purpose {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }
    .query {
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 13px;
      background: #eef3fb;
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 8px;
      overflow-x: auto;
      white-space: nowrap;
    }
    pre {
      margin: 0;
      background: #0f1a28;
      color: #d8e0ec;
      border-radius: 8px;
      padding: 10px;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.35;
    }
    .error {
      margin-top: 8px;
      background: var(--danger-bg);
      border: 1px solid #f2bcbc;
      color: var(--danger);
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
    }
    .nav {
      margin-top: 8px;
      font-size: 13px;
    }
    .nav a {
      color: var(--accent);
      text-decoration: none;
    }
    @media (max-width: 900px) {
      .toolbar {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>LINQ + EF Core Real Usage</h1>
      <div class="muted">Live examples executed against a local Sqlite database in this addon API.</div>
      <div class="toolbar">
        <input id="emailInput" type="text" value="alice@example.com" />
        <input id="pageInput" type="number" value="1" min="0" />
        <input id="sizeInput" type="number" value="2" min="1" />
        <button id="reloadBtn" type="button">Reload</button>
        <button id="resetBtn" class="warn" type="button">Reset DB</button>
      </div>
      <div class="nav">
        <a href="/runtime.html">Runtime snapshot</a>
        |
        <a href="/stream.html">Live stream</a>
        |
        <a href="/nvx2.html">NVX2 inspector</a>
      </div>
      <div id="errorBox"></div>
    </div>

    <div class="card">
      <h2>Request Context</h2>
      <div id="meta" class="meta"></div>
    </div>

    <div class="card">
      <h2>Examples</h2>
      <div id="examples" class="examples"></div>
    </div>
  </div>

  <script>
    const emailInput = document.getElementById("emailInput");
    const pageInput = document.getElementById("pageInput");
    const sizeInput = document.getElementById("sizeInput");
    const reloadBtn = document.getElementById("reloadBtn");
    const resetBtn = document.getElementById("resetBtn");
    const errorBox = document.getElementById("errorBox");
    const meta = document.getElementById("meta");
    const examples = document.getElementById("examples");

    function kv(label, value) {
      return `<div class="kv"><div class="k">${label}</div><div>${value}</div></div>`;
    }

    function setError(message) {
      errorBox.innerHTML = message ? `<div class="error">${message}</div>` : "";
    }

    async function loadExamples() {
      setError("");
      const email = encodeURIComponent(emailInput.value.trim());
      const page = encodeURIComponent(pageInput.value || "1");
      const size = encodeURIComponent(sizeInput.value || "2");
      const res = await fetch(`/api/linq/examples?email=${email}&page=${page}&size=${size}`);
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.error || "Failed to load LINQ examples.");
      }
      render(data);
    }

    function render(data) {
      meta.innerHTML = [
        kv("Generated UTC", data.generatedUtc || ""),
        kv("Database", `<code>${data.databasePath || ""}</code>`),
        kv("Email Filter", `<code>${data.emailFilter || ""}</code>`),
        kv("Page", data.page),
        kv("Size", data.size),
        kv("Example Count", (data.examples || []).length)
      ].join("");

      examples.innerHTML = "";
      for (const item of data.examples || []) {
        const div = document.createElement("div");
        div.className = "example";
        div.innerHTML = `
          <div class="op">${item.operator}</div>
          <div class="purpose">${item.purpose}</div>
          <div class="query">${item.query}</div>
          <pre>${escapeHtml(JSON.stringify(item.result, null, 2))}</pre>
        `;
        examples.appendChild(div);
      }
    }

    async function resetDatabase() {
      setError("");
      const res = await fetch("/api/linq/reset", { method: "POST" });
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.error || "Failed to reset database.");
      }
      await loadExamples();
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    reloadBtn.addEventListener("click", async () => {
      try {
        await loadExamples();
      } catch (err) {
        setError(err.message || String(err));
      }
    });

    resetBtn.addEventListener("click", async () => {
      try {
        await resetDatabase();
      } catch (err) {
        setError(err.message || String(err));
      }
    });

    (async () => {
      try {
        await loadExamples();
      } catch (err) {
        setError(err.message || String(err));
      }
    })();
  </script>
</body>
</html>
