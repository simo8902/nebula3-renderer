<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NDEVC NVX2 Inspector</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --text: #1c232b;
      --muted: #5d6875;
      --line: #d8dde3;
      --accent: #2f6feb;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1080px;
      margin: 20px auto;
      padding: 0 16px 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 14px;
    }
    h1 { margin: 0 0 10px; font-size: 22px; }
    h2 { margin: 0 0 10px; font-size: 17px; }
    .muted { color: var(--muted); font-size: 13px; }
    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }
    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 6px 8px;
      vertical-align: top;
    }
    th { background: #f8f9fb; }
    code {
      background: #f1f3f6;
      border-radius: 4px;
      padding: 1px 4px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 8px;
    }
    .kv {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fcfdff;
    }
    .kv .k {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 3px;
    }
    .error {
      background: #fff1f1;
      border: 1px solid #f2b8b8;
      color: #942f2f;
      padding: 8px;
      border-radius: 6px;
      font-size: 13px;
    }
    .warn {
      background: #fff8e8;
      border: 1px solid #efd7a7;
      color: #7a5b17;
      border-radius: 6px;
      padding: 8px;
      margin-top: 8px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>NVX2 Inspector</h1>
      <div class="muted">Shows size, indices, vertices, groups, and component-mask layout from a `.nvx2` mesh file.</div>
      <form id="inspectForm">
        <input id="pathInput" type="text" placeholder="Path to .nvx2 file (absolute or relative to API process cwd)" />
        <button type="submit">Inspect</button>
      </form>
      <div id="errorBox" style="margin-top:10px;"></div>
    </div>

    <div class="card">
      <h2>Summary</h2>
      <div id="summaryGrid" class="grid"></div>
    </div>

    <div class="card">
      <h2>Component Layout</h2>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Bit</th>
            <th>Offset</th>
            <th>Size</th>
          </tr>
        </thead>
        <tbody id="componentsBody"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Groups</h2>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>FirstVertex</th>
            <th>NumVertices</th>
            <th>FirstTriangle</th>
            <th>NumTriangles</th>
            <th>FirstIndex</th>
            <th>IndexCount</th>
            <th>FirstEdge</th>
            <th>NumEdges</th>
          </tr>
        </thead>
        <tbody id="groupsBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const form = document.getElementById("inspectForm");
    const pathInput = document.getElementById("pathInput");
    const errorBox = document.getElementById("errorBox");
    const summaryGrid = document.getElementById("summaryGrid");
    const componentsBody = document.getElementById("componentsBody");
    const groupsBody = document.getElementById("groupsBody");

    function fmt(n) {
      if (n === null || n === undefined) return "";
      return Number(n).toLocaleString();
    }

    function setError(message) {
      errorBox.innerHTML = message ? `<div class="error">${message}</div>` : "";
    }

    function row(k, v) {
      return `<div class="kv"><div class="k">${k}</div><div>${v}</div></div>`;
    }

    async function inspect(path) {
      setError("");
      summaryGrid.innerHTML = "";
      componentsBody.innerHTML = "";
      groupsBody.innerHTML = "";

      const url = `/api/nvx2/info?path=${encodeURIComponent(path)}`;
      const res = await fetch(url);
      const data = await res.json();

      if (!res.ok) {
        setError(data.error || data.title || "Request failed.");
        return;
      }

      const warnings = (data.warnings || []).map(w => `<div class="warn">${w}</div>`).join("");
      summaryGrid.innerHTML = [
        row("Requested Path", `<code>${data.requestedPath || ""}</code>`),
        row("Resolved Path", `<code>${data.resolvedPath || ""}</code>`),
        row("File Size (bytes)", fmt(data.fileSizeBytes)),
        row("Magic", `<code>${data.magicAscii}</code> / <code>${data.magicHex}</code>`),
        row("Groups", fmt(data.numGroups)),
        row("Vertices", fmt(data.numVertices)),
        row("Vertex Width (floats)", fmt(data.vertexWidthFloats)),
        row("Declared Vertex Stride (bytes)", fmt(data.declaredVertexStrideBytes)),
        row("Calculated Vertex Stride (bytes)", fmt(data.calculatedVertexStrideBytes)),
        row("Component Mask", `<code>0x${Number(data.componentMask).toString(16).toUpperCase()}</code>`),
        row("Expected Index Count", fmt(data.expectedIndexCount)),
        row("Likely 32-bit Indices", data.isLikely32BitIndices ? "Yes" : "No"),
        row("Inferred Index Element Size", `${fmt(data.inferredIndexElementSizeBytes)} bytes`),
        row("Inferred Index Buffer (bytes)", fmt(data.inferredIndexBufferBytes)),
        row("Index Buffer Fits File", data.indexBufferFitsInFile ? "Yes" : "No"),
        row("Header Bytes", fmt(data.headerBytes)),
        row("Group Table Bytes", fmt(data.groupTableBytes)),
        row("Vertex Buffer Offset", fmt(data.vertexBufferOffset)),
        row("Vertex Buffer Bytes", fmt(data.vertexBufferBytes)),
        row("Index Buffer Offset", fmt(data.indexBufferOffset)),
        row("Remaining Bytes @ Index Offset", fmt(data.remainingBytesAfterDeclaredDataOffset)),
      ].join("") + warnings;

      for (const c of data.components || []) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${c.name}</td>
          <td><code>0x${Number(c.bit).toString(16).toUpperCase()}</code></td>
          <td>${fmt(c.offsetBytes)}</td>
          <td>${fmt(c.sizeBytes)}</td>`;
        componentsBody.appendChild(tr);
      }

      for (const g of data.groups || []) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${fmt(g.groupIndex)}</td>
          <td>${fmt(g.firstVertex)}</td>
          <td>${fmt(g.numVertices)}</td>
          <td>${fmt(g.firstTriangle)}</td>
          <td>${fmt(g.numTriangles)}</td>
          <td>${fmt(g.firstIndex)}</td>
          <td>${fmt(g.indexCount)}</td>
          <td>${fmt(g.firstEdge)}</td>
          <td>${fmt(g.numEdges)}</td>`;
        groupsBody.appendChild(tr);
      }
    }

    form.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const path = pathInput.value.trim();
      if (!path) {
        setError("Please provide a path to a .nvx2 file.");
        return;
      }
      try {
        await inspect(path);
      } catch (err) {
        setError(err?.message || String(err));
      }
    });
  </script>
</body>
</html>
